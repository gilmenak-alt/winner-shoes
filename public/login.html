<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — Winner Shoes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a href="index.html" class="home-btn" title="Inicio">⌂</a>

  <div class="main-container">
    <div class="side-branding">
      <h1>Winner Shoes</h1>
      <p>Accede a tu cuenta para comprar, ver pedidos y gestionar devoluciones.</p>
    </div>

    <div class="side-form">
      <h2>Iniciar sesión</h2>

      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="email" placeholder="Correo electrónico" required>
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Contraseña" required>
        </div>

        <button type="submit" class="btn-cta">Ingresar</button>
      </form>

      <div class="links">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
