<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro — Winner Shoes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a href="index.html" class="home-btn" title="Inicio">⌂</a>

  <div class="main-container">
    <div class="side-branding">
      <h1>Winner Shoes</h1>
      <p>Crea tu cuenta para guardar el carrito, pagar con seguridad y solicitar devoluciones con evidencias.</p>
    </div>

    <div class="side-form">
      <h2>Crear cuenta</h2>

      <form id="registerForm">
        <div class="input-group">
          <input type="text" id="nombre" placeholder="Nombre completo" required>
        </div>

        <div class="input-group">
          <input type="email" id="correo" placeholder="Correo electrónico" required>
        </div>

        <div class="input-group">
          <input type="password" id="contraseña" placeholder="Contraseña" required>
        </div>

        <div class="input-group">
          <input type="text" id="telefono" placeholder="Teléfono">
        </div>

        <div class="input-group">
          <input type="text" id="direccion" placeholder="Dirección">
        </div>

        <button type="submit" class="btn-cta">Crear cuenta</button>
      </form>

      <div class="links">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
